# ==============================================================================
# CORE & COLOR FIXES 
# ==============================================================================

# Enable true color support inside tmux
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse support 
set -g mouse on

# Start window and pane numbering at 1 instead of 0 
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Shift status bar to the top (creates a clean separation from Neovim's bottom bar)
set -g status-position top

# For Inactive Panes (bg is Mantle, fg is Subtext1)
set -g window-style 'fg=#a6adc8,bg=#181825'

# For Active Panes (bg is Base, fg is Text)
set -g window-active-style 'fg=#cdd6f4,bg=#1e1e2e'

# ==============================================================================
# VIM-LIKE KEYBINDINGS
# ==============================================================================

# Change Prefix from Ctrl+b to Ctrl+a 
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload tmux config easily with 'Prefix + r'
unbind r
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# Split panes using '|' and '-' 
# This ensures new splits automatically inherit your current working directory
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Move around panes using classic Vim navigation keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes incrementally using Shift + Vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Maximize / Zoom a single pane with 'Prefix + m' 
bind -r m resize-pane -Z

# ==============================================================================
# ROUNDED STATUS BAR 
# ==============================================================================

# Base status bar coloring (Dark charcoal background)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Center the window list so it looks like a clean dock
set -g status-justify left 

# Pad the left and right status segments slightly
set -g status-left-length 40
set -g status-right-length 40

# [LEFT SIDE] Session name in a lavender rounded capsule
set -g status-left "#[fg=#b4befe,bg=default]#[fg=#11111b,bg=#b4befe,bold]󰆍 #S#[fg=#b4befe,bg=default]"

# [RIGHT SIDE] Completely stripped of time/date. Keeping a minimal clean space.
set -g status-right ""

# Add a clean space between the window tabs
set -g window-status-separator "  "

# [INACTIVE TABS] Styled as a subtle gray rounded capsule
set -g window-status-format " #[fg=#313244,bg=default]#[fg=#a6adc8,bg=#313244]#I: #W#[fg=#313244,bg=default] "

# [ACTIVE TAB] Styled as a bright ice-blue rounded capsule
set -g window-status-current-format " #[fg=#89b4fa,bg=default]#[fg=#11111b,bg=#89b4fa,bold]#I: #W#[fg=#89b4fa,bg=default] "
